{% extends 'base.html' %}

{% block title %}
    Plague Products - Updates
{% endblock %}

{% block maininfo %}

<div class="album px-4 py-5 updates-view">
  <div class="container">
    <h2 class="pb-2 border-bottom fw-bolder">Updates</h2>

        <div class="row row-cols-1 g-3 mt-3">
          {% for post in object_list %}
          <div class="col">
            <div class="card updates-card mb-4" style="border-radius: 10px; overflow: hidden;">
                <div class="card-header updates-card-header">
                    <p class="card-text mb-1"><small class="updates-card-meta">Posted {{ post.date }}</small></p>
                    <h5 class="card-title">{{ post.title }}</h5>
                </div>
                <div class="card-body updates-card-body">
<!--                    {{ post.body | safe }}-->
                                        {{ post.body_html | safe }}
                </div>
            </div>
          </div>
      {% endfor %}
    </div>
  </div>
</div>
{% endblock %}
